<div class="process-timeline" #root [class.process-timeline--active]="active()">
  <div class="process-timeline__track" aria-hidden="true"></div>

  @for (step of steps(); track step.id; let i = $index; let last = $last) {
    <article class="process-timeline__step" [style.--step-index]="i">
      <div class="process-timeline__scene" [attr.data-step]="step.id">
        @switch (step.id) {
          @case ('consult') {
            <svg viewBox="0 0 96 96" class="pti" aria-hidden="true">
              <circle class="pti-ring" cx="48" cy="48" r="38" />
              <path class="pti-stroke" d="M34 46a14 14 0 0 1 28 0v2" />
              <rect class="pti-fill" x="28" y="46" width="10" height="16" rx="4" />
              <rect class="pti-fill" x="58" y="46" width="10" height="16" rx="4" />
              <path class="pti-stroke" d="M48 62v6" />
              <path class="pti-stroke" d="M40 70h16" />
              <g class="pti-chat">
                <rect class="pti-bubble" x="62" y="22" width="22" height="14" rx="4" />
                <circle class="pti-dot" cx="67" cy="29" r="1.5" />
                <circle class="pti-dot" cx="73" cy="29" r="1.5" />
                <circle class="pti-dot" cx="79" cy="29" r="1.5" />
              </g>
            </svg>
          }
          @case ('design') {
            <svg viewBox="0 0 96 96" class="pti" aria-hidden="true">
              <rect class="pti-sheet" x="22" y="14" width="52" height="68" rx="3" />
              <path class="pti-grid" d="M30 34h36M30 50h36M30 66h24" />
              <path class="pti-sketch" d="M32 58 C40 42, 50 70, 58 54 S72 62, 76 46" />
              <g class="pti-pencil">
                <line x1="64" y1="26" x2="82" y2="44" />
                <polygon points="82,44 86,40 68,22" />
              </g>
              <circle class="pti-compass" cx="34" cy="26" r="6" />
              <path class="pti-compass-needle" d="M34 22v8M31 26h6" />
            </svg>
          }
          @case ('factory') {
            <svg viewBox="0 0 96 96" class="pti" aria-hidden="true">
              <rect class="pti-stone" x="32" y="60" width="32" height="18" rx="2" />
              <rect class="pti-stone-shine" x="36" y="64" width="8" height="10" rx="1" />
              <g class="pti-gear pti-gear--lg">
                <circle cx="48" cy="38" r="15" />
                <circle cx="48" cy="38" r="5" />
                <path d="M48 20v6M48 50v6M30 38h6M60 38h6M35.5 25.5l4.2 4.2M56.3 46.3l4.2 4.2M35.5 50.5l4.2-4.2M56.3 29.7l4.2-4.2" />
              </g>
              <g class="pti-gear pti-gear--sm">
                <circle cx="70" cy="54" r="10" />
                <circle cx="70" cy="54" r="3.5" />
                <path d="M70 42v4M70 62v4M58 54h4M78 54h4M61.9 47.9l2.8 2.8M75.3 61.3l2.8 2.8M61.9 60.1l2.8-2.8M75.3 46.7l2.8-2.8" />
              </g>
              <circle class="pti-spark" cx="58" cy="52" r="2" />
              <circle class="pti-spark pti-spark--b" cx="64" cy="48" r="1.5" />
            </svg>
          }
          @case ('delivery') {
            <svg viewBox="0 0 96 96" class="pti" aria-hidden="true">
              <line class="pti-road" x1="6" y1="74" x2="90" y2="74" />
              <line class="pti-road-dash" x1="6" y1="74" x2="90" y2="74" />
              <g class="pti-truck">
                <path class="pti-truck-body" d="M14 48h40v20H14z" />
                <path class="pti-truck-cab" d="M54 54h16l10 14v8H54z" />
                <rect class="pti-cargo" x="18" y="52" width="18" height="12" rx="1" />
                <circle class="pti-wheel" cx="28" cy="70" r="7" />
                <circle class="pti-wheel" cx="60" cy="70" r="7" />
                <circle class="pti-wheel-hub" cx="28" cy="70" r="2.5" />
                <circle class="pti-wheel-hub" cx="60" cy="70" r="2.5" />
              </g>
            </svg>
          }
          @default {
            <svg viewBox="0 0 96 96" class="pti" aria-hidden="true">
              <rect class="pti-base" x="28" y="72" width="40" height="6" rx="1" />
              <g class="pti-monument">
                <path d="M42 38h12v34H42z" />
                <path d="M40 38h16l-2-8h-12z" />
              </g>
              <g class="pti-crane">
                <path d="M16 76V24" />
                <path d="M16 24h56" />
                <path d="M68 24l4-8" />
                <line class="pti-rope" x1="60" y1="24" x2="60" y2="40" />
                <path class="pti-hook" d="M57 40h6v6a3 3 0 0 1-6 0z" />
              </g>
            </svg>
          }
        }
      </div>
      <h3>{{ step.title }}</h3>
      <p>{{ step.desc }}</p>
      @if (!last) {
        <div class="process-timeline__connector"></div>
      }
    </article>
  }
</div>
