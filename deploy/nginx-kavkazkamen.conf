# KavkazKamen — nginx
# Public:  https://kavkazkamen.ru
# Admin:   https://admin.kavkazkamen.ru  → SPA /manage + Django /admin + /api
# Backend: gunicorn on 127.0.0.1:8000

upstream kavkazkamen_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kavkazkamen.ru www.kavkazkamen.ru admin.kavkazkamen.ru;
    return 301 https://$host$request_uri;
}

# ─── Public site ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kavkazkamen.ru www.kavkazkamen.ru;

    ssl_certificate     /etc/letsencrypt/live/kavkazkamen.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kavkazkamen.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/kavkazkamen/frontend/dist/frontend/browser;
    index index.html;

    client_max_body_size 10m;

    # Block admin surfaces on public host
    location ^~ /manage {
        return 404;
    }
    location ^~ /admin {
        return 404;
    }

    location = /robots.txt {
        proxy_pass http://kavkazkamen_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /sitemap.xml {
        proxy_pass http://kavkazkamen_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://kavkazkamen_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /media/ {
        alias /var/www/kavkazkamen/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── Admin CMS ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.kavkazkamen.ru;

    ssl_certificate     /etc/letsencrypt/live/kavkazkamen.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kavkazkamen.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/kavkazkamen/frontend/dist/frontend/browser;
    index index.html;

    client_max_body_size 12m;

    location /admin/ {
        proxy_pass http://kavkazkamen_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://kavkazkamen_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://kavkazkamen_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /media/ {
        alias /var/www/kavkazkamen/backend/media/;
        expires 7d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
