# HTTP-only bootstrap (before certbot). After certbot, use nginx-kavkazkamen.conf

upstream kavkazkamen_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name kavkazkamen.ru www.kavkazkamen.ru;

    root /var/www/kavkazkamen/frontend/dist/frontend/browser;
    index index.html;
    client_max_body_size 10m;

    location ^~ /manage { return 404; }
    location ^~ /admin { return 404; }

    location = /robots.txt {
        proxy_pass http://kavkazkamen_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /sitemap.xml {
        proxy_pass http://kavkazkamen_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/ {
        proxy_pass http://kavkazkamen_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /media/ {
        alias /var/www/kavkazkamen/backend/media/;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.kavkazkamen.ru;

    root /var/www/kavkazkamen/frontend/dist/frontend/browser;
    index index.html;
    client_max_body_size 12m;

    location /admin/ {
        proxy_pass http://kavkazkamen_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /static/ {
        proxy_pass http://kavkazkamen_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://kavkazkamen_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /media/ {
        alias /var/www/kavkazkamen/backend/media/;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
