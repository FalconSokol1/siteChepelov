name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via git pull on server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "Задайте секреты DEPLOY_HOST и DEPLOY_SSH_KEY (Settings → Secrets → Actions)." >&2
            exit 1
          fi

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Поддержка: сырой ключ ИЛИ base64 (надёжнее для Windows → GitHub Secrets)
          KEY_RAW=$(printf '%s' "$DEPLOY_SSH_KEY" | tr -d '\r')
          if printf '%s' "$KEY_RAW" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s\n' "$KEY_RAW" > ~/.ssh/deploy_key
          else
            printf '%s' "$KEY_RAW" | base64 -d > ~/.ssh/deploy_key
            printf '\n' >> ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key

          if ! grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "DEPLOY_SSH_KEY: нужен приватный ключ или его base64 (не .pub)." >&2
            exit 1
          fi
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "Ключ повреждён. Вставьте base64 приватного ключа (см. deploy/GITHUB_ACTIONS.md)." >&2
            exit 1
          fi

          PORT="${DEPLOY_PORT:-22}"
          USER_NAME="${DEPLOY_USER:-root}"
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          cat > ~/.ssh/config <<EOF
          Host deploy
            HostName ${DEPLOY_HOST}
            User ${USER_NAME}
            Port ${PORT}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            PreferredAuthentications publickey
            StrictHostKeyChecking accept-new
          EOF
          sed -i 's/^[[:space:]]\+//' ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Git pull + build + restart on server
        run: |
          ssh deploy bash -s <<'EOF'
          set -euo pipefail
          APP_DIR=/var/www/kavkazkamen
          REPO_URL=https://github.com/FalconSokol1/siteChepelov.git
          export DEBIAN_FRONTEND=noninteractive

          apt-get update -qq
          apt-get install -y -qq nginx python3 python3-venv python3-pip git curl

          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y -qq nodejs
          fi

          mkdir -p /var/www
          if [ ! -d "${APP_DIR}/.git" ]; then
            rm -rf "${APP_DIR}"
            git clone "${REPO_URL}" "${APP_DIR}"
          else
            cd "${APP_DIR}"
            git fetch origin
            git reset --hard origin/main
          fi

          cd "${APP_DIR}/backend"
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -q --upgrade pip
          pip install -q -r requirements.txt

          if [ ! -f .env ]; then
            echo "ERROR: ${APP_DIR}/backend/.env missing. Create it once on the server." >&2
            exit 1
          fi

          python manage.py migrate --noinput
          python manage.py seed_data
          python manage.py collectstatic --noinput
          mkdir -p media
          chown -R www-data:www-data media staticfiles 2>/dev/null || true

          cd "${APP_DIR}/frontend"
          npm ci --prefer-offline || npm install
          npm run build -- --configuration=production

          cp "${APP_DIR}/deploy/kavkazkamen.service" /etc/systemd/system/kavkazkamen.service
          systemctl daemon-reload
          systemctl enable kavkazkamen
          systemctl restart kavkazkamen

          if [ -f /etc/letsencrypt/live/kavkazkamen.ru/fullchain.pem ]; then
            cp "${APP_DIR}/deploy/nginx-kavkazkamen.conf" /etc/nginx/sites-available/kavkazkamen
          else
            cp "${APP_DIR}/deploy/nginx-kavkazkamen.http.conf" /etc/nginx/sites-available/kavkazkamen
          fi
          ln -sfn /etc/nginx/sites-available/kavkazkamen /etc/nginx/sites-enabled/kavkazkamen
          nginx -t
          systemctl reload nginx
          curl -fsS http://127.0.0.1:8000/api/health/ || true
          echo "Deploy OK"
          EOF
